<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My profile</title>
</head>
<body>
    <div class="container">
        <header class="header">
            <img src="./images/icon.svg" alt="로고 아이콘" class="logo-icon">
            <h1 clas=""title">My profile</h1>
        </header>

        <main class="profile-main">

            <div class="profile-photo">
                <img src="./images/profile.svg" alt="프로필 사진" class="profile-img">

            </div>

            <div class="profile-info">
                <div class="info-item">
                    <span class="label">이름</span>
                    <span class="value">박서현</span>

                </div>

                <div class="info-item">
                    <span class="label">닉네임</span>
                    <span class="value">둥둥</span>
                </div>

                <div class="info-item">
                    <span class="label">생년월일</span>
                    <span class="value">2004.11.22</span>
                </div>

                <div class="info-item">
                    <span class="label">전공</span>
                    <span class="value">컴퓨터과학과</span>
                </div>

                <div class="info-item">
                    <span class="label">이메일</span>
                    <span class="value">2411932@sookmyung.ac.kr</span>
                </div>
            </div>
        </main>

        <footer class="footer">
            <a href="./main.html" class="exit-link">
                <img src="./images/out.svg" alt="나가기 아이콘">
            </a>
        </footer>
    </div>
    
</body>
</html>
